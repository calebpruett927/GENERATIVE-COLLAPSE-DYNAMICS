        contract: "ASTRO.INTSTACK.v1"
        inputs: ["v_rot", "r_obs", "sigma_v", "M_luminous"]
        outputs: ["M_virial", "M_dynamic", "dark_matter_fraction", "virial_ratio", "regime"]
        frozen_params:
