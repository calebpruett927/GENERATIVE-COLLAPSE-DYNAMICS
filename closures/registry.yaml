        contract: "ASTRO.INTSTACK.v1"
        inputs: ["age", "mass", "metallicity", "alpha_fe", "teff", "logg", "av", "age_err_stat"]
        outputs: ["F", "omega", "IC", "kappa", "S", "C", "gap", "regime"]
        frozen_params:
