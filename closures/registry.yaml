          tip_height_AA: 4.0
          E_field_VA: 0.1
          d_PBE_TS_AA: 2.86
          d_PBE_MBD_AA: 3.07
        reference: "DOI:10.1021/acsnano.5c16052"
      - name: "quantum_dimer_model"
        path: "closures/quantum_mechanics/quantum_dimer_model.py"
