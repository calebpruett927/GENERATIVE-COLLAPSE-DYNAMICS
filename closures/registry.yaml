        contract: "QM.INTSTACK.v1"
        inputs: ["dimer_filling", "topological_order", "string_coherence",
                 "symmetry_preservation", "spectral_gap", "fractionalization",
                 "vison_momentum", "phase_stability"]
        outputs: ["F", "omega", "IC", "kappa", "regime",
                  "heterogeneity_gap", "weakest_channel", "strongest_channel"]
        frozen_params:
          epsilon: 1.0e-8
          h_transverse: 0.4
          t_kinetic: 1.0
        reference: "DOI:10.1038/s41467-022-33431-5"
      - name: "fqhe_bilayer_graphene"
        path: "closures/quantum_mechanics/fqhe_bilayer_graphene.py"
        description: >
          FQHE bilayer graphene AB interference independent derivation:
