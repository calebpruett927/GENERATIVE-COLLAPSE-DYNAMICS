lessons_learned:
  - id: "LL-CN-01"
    date: "2026-07-15"
    summary: >
      Brain atlas integration (HoliAtlas 2026 + NextBrain 2025): ultra-high
      resolution (0.125 mm³) enables detection of substructure-level
      neurodegeneration invisible at standard 1 mm³. The GCD kernel reveals
      that small structures with high resolution dependence show larger
      heterogeneity gaps (Δ = F − IC) due to geometric slaughter from low
      volumetric fraction. The thalamus (13 nuclei, highest connectivity)
      achieves highest F among all 35 atlas structures.
