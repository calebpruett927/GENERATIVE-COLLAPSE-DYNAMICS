# Headless Contract Gateway — Autonomous Site Deployment
#
# Triggers:
#   1. Push to main (validates + rebuilds all domain sites)
#   2. repository_dispatch from api_umcp.py webhook (rebuilds specific domain)
#   3. Manual dispatch (workflow_dispatch)
#
# Flow:
#   Python validates → HCG extracts → Rosetta generates markdown → Astro builds → Deploy

name: HCG Deploy

on:
  # Rebuild when validation data changes
  push:
    branches: [main]
    paths:
      - 'ledger/**'
      - 'canon/**'
      - 'closures/**'
      - 'contracts/**'
      - 'casepacks/**'
      - 'src/umcp/hcg/**'
      - 'web/**'

  # Webhook trigger from api_umcp.py
  repository_dispatch:
    types:
      - hcg-rebuild-*

  # Manual trigger
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to rebuild (empty = all)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install UMCP
        run: pip install -e ".[all]"

      - name: Determine domain
        id: domain
        run: |
          # From repository_dispatch
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DOMAIN=$(echo "${{ github.event.action }}" | sed 's/hcg-rebuild-//')
            echo "domain=${DOMAIN}" >> "$GITHUB_OUTPUT"
            echo "build_all=false" >> "$GITHUB_OUTPUT"
          # From workflow_dispatch
          elif [ -n "${{ github.event.inputs.domain }}" ]; then
            echo "domain=${{ github.event.inputs.domain }}" >> "$GITHUB_OUTPUT"
            echo "build_all=false" >> "$GITHUB_OUTPUT"
          # Default: all
          else
            echo "domain=" >> "$GITHUB_OUTPUT"
            echo "build_all=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate site content
        run: |
          if [ "${{ steps.domain.outputs.build_all }}" = "true" ]; then
            python scripts/generate_site_markdown.py --all --output web/src/content -v
          else
            python scripts/generate_site_markdown.py \
              --domain "${{ steps.domain.outputs.domain }}" \
              --output web/src/content -v
          fi

      - name: Upload generated content
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: site-content
          path: web/src/content/

  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download generated content
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: site-content
          path: web/src/content/

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build Astro site
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: site-build
          path: web/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: site-build
          path: ./dist

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5
        with:
          enablement: true

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
