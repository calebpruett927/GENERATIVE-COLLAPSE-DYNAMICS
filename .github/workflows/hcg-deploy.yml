# Headless Contract Gateway — Autonomous Site Deployment
#
# Triggers:
#   1. Push to main (validates + rebuilds all domain sites)
#   2. repository_dispatch from api_umcp.py webhook (rebuilds specific domain)
#   3. Manual dispatch (workflow_dispatch)
#
# Flow:
#   Python validates → HCG extracts → Rosetta generates markdown → Astro builds → Deploy

name: HCG Deploy

on:
  # Rebuild when validation data changes
  push:
    branches: [main]
    paths:
      - 'ledger/**'
      - 'canon/**'
      - 'closures/**'
      - 'contracts/**'
      - 'casepacks/**'
      - 'src/umcp/hcg/**'
      - 'web/**'
      - '.github/workflows/hcg-deploy.yml'

  # Webhook trigger from api_umcp.py
  repository_dispatch:
    types:
      - hcg-rebuild-*

  # Manual trigger
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to rebuild (empty = all)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install UMCP
        run: pip install -e ".[all]"

      - name: Determine domain
        id: domain
        run: |
          # From repository_dispatch
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            DOMAIN=$(echo "${{ github.event.action }}" | sed 's/hcg-rebuild-//')
            echo "domain=${DOMAIN}" >> "$GITHUB_OUTPUT"
            echo "build_all=false" >> "$GITHUB_OUTPUT"
          # From workflow_dispatch
          elif [ -n "${{ github.event.inputs.domain }}" ]; then
            echo "domain=${{ github.event.inputs.domain }}" >> "$GITHUB_OUTPUT"
            echo "build_all=false" >> "$GITHUB_OUTPUT"
          # Default: all
          else
            echo "domain=" >> "$GITHUB_OUTPUT"
            echo "build_all=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate site content
        run: |
          if [ "${{ steps.domain.outputs.build_all }}" = "true" ]; then
            python scripts/generate_site_markdown.py --all --output web/src/content -v
          else
            python scripts/generate_site_markdown.py \
              --domain "${{ steps.domain.outputs.domain }}" \
              --output web/src/content -v
          fi

      - name: Upload generated content
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: site-content
          path: web/src/content/

  build:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Download generated content
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: site-content
          path: web/src/content/

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: web
        run: npm install

      - name: Build Astro site
        working-directory: web
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: site-build
          path: web/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: site-build
          path: ./dist

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
