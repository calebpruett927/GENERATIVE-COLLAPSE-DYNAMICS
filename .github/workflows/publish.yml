name: publish

# Triggered when a version tag (v*) is pushed
# Example: git tag v2.2.3 && git push origin v2.2.3

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Needed for GitHub Release creation
  id-token: write   # For trusted publishing (OIDC) - currently not used but available

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          password: ${{ secrets.PYPI_PUBLISH_TOKEN }}
          attestations: false
          skip-existing: true
        # NOTE: The PYPI_PUBLISH_TOKEN secret MUST be configured in GitHub repo settings:
        # https://github.com/calebpruett927/GENERATIVE-COLLAPSE-DYNAMICS/settings/secrets/actions
        #
        # To switch to OIDC (no token needed): remove 'with:' section and configure at
        # https://pypi.org/manage/account/publishing/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
