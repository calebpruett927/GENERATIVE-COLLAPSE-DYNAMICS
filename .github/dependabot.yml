# Dependabot configuration — UMCP v2.2.3
# Monitors Python packages, GitHub Actions, and dev containers for updates.
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Python packages (PyPI)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    assignees:
      - "calebpruett927"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci-cd"
    assignees:
      - "calebpruett927"

  # Dev containers
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
