schema: "schemas/weights.schema.json"

weights:
  id: "bell_curve_pgs.weights"
  version: "1.0.0"
  policy: nonnegative_sum_to_one
  channels:
    - name: hs_completion
      label: "HS completion PGS effect"
      weight: 0.166667
    - name: college_attendance
      label: "College attendance PGS effect"
      weight: 0.166667
    - name: college_completion
      label: "College completion PGS effect"
      weight: 0.166667
    - name: graduate_school
      label: "Graduate school PGS effect"
      weight: 0.166667
    - name: assortative_mating
      label: "Spousal PGS correlation"
      weight: 0.166667
    - name: fertility
      label: "Fertility PGS effect"
      weight: 0.166667
  validation:
    sum: 1.0
    tolerance: 1.0e-4
  notes: "Equal weights across 6 channels. w_i = 1/6 each. No a priori reason to privilege one educational transition or genetic pathway over another."
